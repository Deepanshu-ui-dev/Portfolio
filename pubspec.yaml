name: monofolio
description: Deepanshu Kaushik — Portfolio App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.3.0
  http: ^1.2.0
  flutter_animate: ^4.2.0-hotfix.1
  flutter_riverpod: ^2.4.9
  flutter_markdown: ^0.6.19
  go_router: ^13.2.0
  shared_preferences: ^2.2.3
  flutter_svg: ^2.0.10+1
  just_audio: ^0.10.5
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # Recommended: add JetBrains Mono to pubspec for the monospace aesthetic
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
  assets:
    - assets/icons/github.svg
    - assets/icons/linkedin.svg
    - assets/icons/x.svg
    - assets/images/profile.png
    - assets/images/
