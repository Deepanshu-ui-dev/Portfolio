name: monofolio
description: >
  Production-ready portfolio application built with Flutter, showcasing 
  high-quality UI/UX design, smooth animations, and optimized performance. 
  Features interactive theme switching, responsive layouts, and pixel-perfect 
  design across mobile and web platforms.
publish_to: "none"
version: 1.0.0+1
homepage: https://github.com/Deepanshu-ui-dev/Deepanshu-Kaushik-Portfolio
repository: https://github.com/Deepanshu-ui-dev/Deepanshu-Kaushik-Portfolio
issue_tracker: https://github.com/Deepanshu-ui-dev/Deepanshu-Kaushik-Portfolio/issues
documentation: https://github.com/Deepanshu-ui-dev/Deepanshu-Kaushik-Portfolio#readme

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Networking & API
  http: ^1.2.0
  url_launcher: ^6.3.0
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # UI & Animations
  flutter_animate: ^4.2.0-hotfix.1
  flutter_svg: ^2.0.10+1
  lucide_icons: ^0.257.0
  redacted: ^1.0.12
  
  # Content & Data
  flutter_markdown: ^0.6.19
  shared_preferences: ^2.2.3
  
  # Navigation
  go_router: ^13.2.0
  
  # Audio
  just_audio: ^0.10.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
  
  assets:
    - assets/icons/github.svg
    - assets/icons/linkedin.svg
    - assets/icons/x.svg
    - assets/images/profile.png
    - assets/images/
